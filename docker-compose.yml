version: '3.8'

services:
  postgres:
    image: postgres:15
    ports:
      - "5433:5432"
    volumes:
      - ./bd/backup/bkboca_2025_10:/docker-entrypoint-initdb.d/bkboca.sql
    environment:
      - POSTGRES_DB=bkboca
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
    restart: unless-stopped

  bd:
    build: ./bd
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bkboca
      - DB_USER=postgres
      - DB_PASS=1234
    depends_on:
      - postgres
    restart: unless-stopped

  generarglobos:
    build: ./generarglobos
    ports:
      - "5000:5000"
    volumes:
      - ./generarglobos:/app
    environment:
      - BD_SERVICE_URL=http://bd:3001
    depends_on:
      - bd
      - postgres
    restart: unless-stopped

  generartabla:
    build: ./generartabla
    ports:
      - "5002:5002"
    volumes:
      - ./generartabla:/app
    environment:
      - BD_SERVICE_URL=http://bd:3001
      - RABBIT_HOST=rabbitmq
      - RABBIT_USER=rpc
      - RABBIT_PASS=rpc1234
      - COACH_SERVICE_URL=http://coach-service:5003
    depends_on:
      - bd
      - postgres
      - rabbitmq
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./api-gateway:/app
    environment:
      - GLOBOS_SERVICE_URL=http://generarglobos:5000
      - TABLA_SERVICE_URL=http://generartabla:5002
      - COACH_SERVICE_URL=http://coach-service:5003
    depends_on:
      - generarglobos
      - generartabla
      - coach-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=rpc
      - RABBITMQ_DEFAULT_PASS=rpc1234
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  coach-postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=coachdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
    volumes:
      - coach-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  coach-service:
    build: ./coach-service
    ports:
      - "5003:5003"
    environment:
      - COACH_DB_URL=postgresql://postgres:1234@coach-postgres:5432/coachdb
      - BD_SERVICE_URL=http://bd:3001
    depends_on:
      - coach-postgres
      - bd
    restart: unless-stopped

  notificacion-ranking-service:
    build: ./notificacion-ranking-service
    environment:
      - RABBIT_HOST=rabbitmq
      - RABBIT_USER=rpc
      - RABBIT_PASS=rpc1234
      - COACH_SERVICE_URL=http://coach-service:5003
      - TABLA_SERVICE_URL=http://generartabla:5002
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - FROM_ADDR=${FROM_ADDR:-}
    depends_on:
      - rabbitmq
      - coach-service
      - generartabla
    restart: unless-stopped

volumes:
  coach-pgdata:

networks:
  default: